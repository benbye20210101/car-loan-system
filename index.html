  <!-- ===== iframe 自動撐高（手機版至少 900px） ===== -->
  <script>
    (function () {
      'use strict';

      var MIN_HEIGHT = 900; /* 手機版最小高度 px */

      /* ── 取得頁面實際高度，並與最小值取最大 ── */
      function getHeight() {
        var actual = Math.max(
          document.body.scrollHeight,
          document.body.offsetHeight,
          document.documentElement.scrollHeight,
          document.documentElement.offsetHeight
        );
        return Math.max(actual, MIN_HEIGHT);
      }

      /* ── 通知 Google Sites 父層調整 iframe 高度 ── */
      function notifyResize() {
        var h = getHeight();
        /* 強制 body 本身也撐到足夠高度，讓 iframe 有內容可量 */
        document.body.style.minHeight = h + 'px';
        try {
          window.parent.postMessage({ type: 'resize', height: h }, '*');
          window.parent.postMessage(JSON.stringify({ height: h }), '*');
        } catch (e) { /* 非 iframe 環境忽略 */ }
      }

      /* ── 頁面載入完成後立即執行 ── */
      window.addEventListener('load', notifyResize);

      /* ── ResizeObserver：內容高度變化時自動重送（如結果卡片展開） ── */
      if (typeof ResizeObserver !== 'undefined') {
        new ResizeObserver(notifyResize).observe(document.body);
      } else {
        /* 舊瀏覽器備援：輪詢偵測 */
        var _lastH = 0;
        setInterval(function () {
          var h = getHeight();
          if (h !== _lastH) { _lastH = h; notifyResize(); }
        }, 400);
      }

    })();
  </script>

  <script>
    (function () {

      /* ══════════════════════════════════════════════════════════════

      ══════════════════════════════════════════════════════════════ */
      var GAS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbyMNfV0Pp8TdVZeQeoLMJM8Qrf1aVM8Bv1RuvVXK4CKcmL1KjWTWAn9di2cbcT3LxL_/exec';
      var GAS_API_TOKEN  = 'Bf7Kx9mNpQvL2wEjRtYdCz4oHs1Ua3Xi';

      /* ── 主表單元素 ── */

      var toastRateLimit  = document.getElementById('toast-ratelimit');

      /* ── 等待動畫 ── */
      var loadingOverlay = document.getElementById('loading-overlay');

      var currentCaptcha  = '';
      var pendingItems    = null; /* 暫存試算結果，登入成功後顯示 */
      var pendingFormData = null; /* 暫存表單原始值，登入成功後送至 SC 試算表 */

      /* ════════════════════════════════════════════════════════════
         等待動畫控制
      ════════════════════════════════════════════════════════════ */
      function showLoading() { loadingOverlay.classList.add('show'); }
      function hideLoading()  { loadingOverlay.classList.remove('show'); }

      /* ════════════════════════════════════════════════════════════
         頻率限制（Rate Limiting）
         ‧ 以 localStorage 記錄同裝置同瀏覽器的請求次數（模擬 IP 行為）
         ‧ 每小時最多 5 次 GAS 請求
         ‧ 超過後顯示警示框 5 秒；警示消失後起算 60 分鐘冷卻期
      ════════════════════════════════════════════════════════════ */
      var RL_KEY         = 'car_loan_rl';
      var RL_MAX         = 5;
      var RL_WINDOW_MS   = 60 * 60 * 1000;  /* 1 小時計數窗口        */
      var RL_TOAST_MS    = 5 * 1000;         /* 警示框顯示 5 秒       */
      var RL_COOLDOWN_MS = 60 * 60 * 1000;  /* 警示消失後 60 分鐘冷卻 */

      var rlToastTimer = null;

      function getRLData() {
        try {
          var raw = localStorage.getItem(RL_KEY);
          return raw ? JSON.parse(raw)
                     : { count: 0, windowStart: 0, blocked: false, blockedAt: null };
        } catch (e) {
          return { count: 0, windowStart: 0, blocked: false, blockedAt: null };
        }
      }

      function setRLData(d) {
        try { localStorage.setItem(RL_KEY, JSON.stringify(d)); } catch (e) {}
      }

      /**
       * 檢查並記錄本次請求
       * 回傳：'allowed' | 'rate_limited' | 'blocked'
       *   'allowed'      → 允許，已累計次數
       *   'rate_limited' → 剛達上限，觸發封鎖（需顯示警示框）
       *   'blocked'      → 冷卻期尚未結束（可再次顯示警示框）
       */
      function checkRateLimit() {
        var now  = Date.now();
        var data = getRLData();

        /* 若目前處於封鎖狀態，檢查冷卻是否結束 */
        if (data.blocked && data.blockedAt) {
          var cooldownEnd = data.blockedAt + RL_TOAST_MS + RL_COOLDOWN_MS;
          if (now < cooldownEnd) {
            return 'blocked';        /* 冷卻期尚未結束 */
          }
          /* 冷卻結束，重置所有計數 */
          data = { count: 0, windowStart: now, blocked: false, blockedAt: null };
          setRLData(data);
        }

        /* 計數窗口已過期（超過 1 小時），重置計數 */
        if (now - data.windowStart >= RL_WINDOW_MS) {
          data.count       = 0;
          data.windowStart = now;
          data.blocked     = false;
          data.blockedAt   = null;
        }

        /* 已達上限，觸發封鎖 */
        if (data.count >= RL_MAX) {
          data.blocked   = true;
          data.blockedAt = now;
          setRLData(data);
          return 'rate_limited';
        }

        /* 允許本次請求，累計次數 */
        data.count++;
        setRLData(data);
        return 'allowed';
      }

      function showRateLimitToast() {
        if (rlToastTimer) { clearTimeout(rlToastTimer); }
        toastRateLimit.classList.add('show');
        rlToastTimer = setTimeout(function () {
          toastRateLimit.classList.remove('show');
          rlToastTimer = null;
        }, RL_TOAST_MS);
      }

      /* ════════════════════════════════════════════════════════════
         車齡即時驗證
      ════════════════════════════════════════════════════════════ */
      inputC.addEventListener('input', function () { validateAge(true); });

      /* 離開車齡輸入框：合法值自動補齊為小數第一位（例如 1 → 1.0），並聯動驗證貸款類型 */
      inputC.addEventListener('blur', function () {
        var raw = inputC.value.trim();
        if (raw === '') return;
        var val = parseFloat(raw);
        if (!isNaN(val) && val >= 0 && val <= 20 && /^\d+(\.\d?)?$/.test(raw)) {
          inputC.value = val.toFixed(1);
          inputC.classList.remove('invalid');
          ageError.classList.remove('show');
          if (val === 0) {
            clearAgeNewCarError();
            checkAgeZeroLoanType(true);
          } else {
            clearLoanTypeAgeError();
            checkNewCarAgeConstraint(true);
          }
        } else {
          validateAge(true);
        }
      });

      /* 貸款類型選單：新車類型 → 車齡自動帶入 0.0；非新車類型且車齡為 0 → 顯示錯誤 */
      var NEW_CAR_TYPES = ['new-zero-rate', 'new-with-rate'];

      selectD.addEventListener('change', function () {
        var isNewCar   = NEW_CAR_TYPES.indexOf(selectD.value) !== -1;
        var raw        = inputC.value.trim();
        var currentAge = parseFloat(raw);
        if (isNewCar) {
          clearLoanTypeAgeError();
          if (raw === '' || currentAge === 0) {
            /* 車齡空白或已是 0：自動帶入 0.0 */
            inputC.value = '0.0';
            inputC.classList.remove('invalid');
            ageError.classList.remove('show');
            clearAgeNewCarError();
          } else {
            /* 車齡已填且 > 0：顯示錯誤，提示車齡需為 0 */
            checkNewCarAgeConstraint(true);
          }
        } else if (!isNaN(currentAge) && currentAge === 0) {
          clearAgeNewCarError();
          checkAgeZeroLoanType(true);
        } else {
          clearLoanTypeAgeError();
          clearAgeNewCarError();
        }
      });

      /* 車齡為 0 時，貸款類型限制驗證 */
      function checkAgeZeroLoanType(showMsg) {
        if (NEW_CAR_TYPES.indexOf(selectD.value) === -1) {
          if (showMsg) {
            selectD.classList.add('invalid');
            loanTypeAgeError.classList.add('show');
          }
          return false;
        }
        clearLoanTypeAgeError();
        return true;
      }

      function clearLoanTypeAgeError() {
        selectD.classList.remove('invalid');
        loanTypeAgeError.classList.remove('show');
      }

      /* 新車貸款類型且車齡 > 0 的驗證 */
      function checkNewCarAgeConstraint(showMsg) {
        var raw    = inputC.value.trim();
        var ageVal = parseFloat(raw);
        if (NEW_CAR_TYPES.indexOf(selectD.value) !== -1 && raw !== '' && !isNaN(ageVal) && ageVal > 0) {
          if (showMsg) {
            inputC.classList.add('invalid');
            ageNewCarError.classList.add('show');
          }
          return false;
        }
        clearAgeNewCarError();
        return true;
      }

      function clearAgeNewCarError() {
        ageNewCarError.classList.remove('show');
        /* 只在一般驗證錯誤也未顯示時，才移除紅框 */
        if (!ageError.classList.contains('show')) {
          inputC.classList.remove('invalid');
        }
      }

      function validateAge(showMsg) {
        var raw = inputC.value.trim();
        var val = parseFloat(raw);
        /* 允許整數或小數點第一位（0 ～ 20），不接受負數或超過一位小數 */
        var ok  = raw !== '' && !isNaN(val) && val >= 0 && val <= 20 && /^\d+(\.\d)?$/.test(raw);
        if (!ok && raw !== '') {
          inputC.classList.add('invalid');
          if (showMsg) ageError.classList.add('show');
          return false;
        }
        inputC.classList.remove('invalid');
        ageError.classList.remove('show');
        return true;
      }

      /* ════════════════════════════════════════════════════════════
         車貸試算按鈕：驗證表單 → 暫存結果 → 開啟登入框
      ════════════════════════════════════════════════════════════ */
      btnCalc.addEventListener('click', function () {
        var brand    = selectA.value;
        var brandTxt = selectA.options[selectA.selectedIndex].text;
        var model    = selectB.value;
        var modelTxt = selectB.options[selectB.selectedIndex].text;
        var ageRaw   = inputC.value.trim();
        var loanType = selectD.value;
        var loanTxt  = selectD.options[selectD.selectedIndex].text;

        var errors = [];
        if (!brand)    errors.push('請選擇「貸款車輛廠牌」');
        if (!model)    errors.push('請選擇「車型」');
        if (ageRaw === '') {
          errors.push('請輸入「車齡」');
        } else if (!validateAge(true)) {
          errors.push('「車齡」必須為 0 到 20 之間的正數（最多小數點第一位）');
        }
        if (!loanType) errors.push('請選擇「貸款類型」');

        /* 車齡為 0 時，貸款類型必須為新車 */
        if (ageRaw !== '' && parseFloat(ageRaw) === 0 && loanType) {
          if (NEW_CAR_TYPES.indexOf(loanType) === -1) {
            checkAgeZeroLoanType(true);
            errors.push('車齡為 0 時，貸款類型僅可選擇「新車0利率」或「新車有利率」');
          }
        }

        /* 新車貸款類型時，車齡必須為 0 */
        if (ageRaw !== '' && parseFloat(ageRaw) > 0 && loanType) {
          if (NEW_CAR_TYPES.indexOf(loanType) !== -1) {
            checkNewCarAgeConstraint(true);
            errors.push('選擇新車貸款類型時，車齡必須為 0');
          }
        }

        if (errors.length > 0) {
          alert('⚠ 請完整填寫以下欄位：\n\n• ' + errors.join('\n• '));
          return;
        }

        /* 暫存試算資料，登入成功後再顯示 */
        pendingItems = [
          { key: '貸款車輛廠牌', val: brandTxt },
          { key: '車型',         val: modelTxt },
          { key: '車齡',         val: parseFloat(ageRaw).toFixed(1) + '　年' },
          { key: '貸款類型',     val: loanTxt  },
          { key: '有保證人',     val: checkGuarantor.checked ? '是' : '否' }
        ];

        /* 暫存表單原始值，登入成功後一併送至 GAS 寫入 SC 試算表 */
        pendingFormData = {
          brand:     brandTxt,
          model:     modelTxt,
          age:       ageRaw,
          loanType:  loanTxt,
          guarantor: checkGuarantor.checked ? '是' : '否'
        };

        /* 顯示等待動畫 700ms 後開啟登入框 */
        showLoading();
        setTimeout(function () { hideLoading(); openModal(); }, 700);
      });

      /* ── 登入成功後顯示試算結果（含 AI 建議） ── */
      function showResults(aiSuggestion) {
        if (!pendingItems) return;

        /* AI 建議列排在最上方 */
        var aiRow = '<div class="result-item result-item-ai">' +
                      '<div class="item-key">AI建議</div>' +
                      '<div class="item-val item-val-ai">' + (aiSuggestion || '（無建議）') + '</div>' +
                    '</div>';

        var rows = pendingItems.map(function (item) {
          return '<div class="result-item">' +
                   '<div class="item-key">' + item.key + '</div>' +
                   '<div class="item-val">' + item.val + '</div>' +
                 '</div>';
        }).join('');

        resultGrid.innerHTML = aiRow + rows;
        resultOverlay.classList.add('show');
        pendingItems    = null;
        pendingFormData = null;
      }

      /* ════════════════════════════════════════════════════════════
         重新試算：清除所有輸入，關閉試算摘要浮動框
      ════════════════════════════════════════════════════════════ */
      btnReset.addEventListener('click', function () {
        /* 關閉浮動框 */
        resultOverlay.classList.remove('show');

        /* 清除所有表單欄位 */
        selectA.value          = '';
        selectB.value          = '';
        inputC.value           = '';
        selectD.value          = '';
        checkGuarantor.checked = false;

        /* 清除所有錯誤狀態 */
        inputC.classList.remove('invalid');
        selectD.classList.remove('invalid');
        ageError.classList.remove('show');
        ageNewCarError.classList.remove('show');
        loanTypeAgeError.classList.remove('show');

        /* 清除暫存資料 */
        pendingItems    = null;
        pendingFormData = null;
      });

      /* ════════════════════════════════════════════════════════════
         浮動登入框：開啟 / 關閉 / 驗證碼產生
      ════════════════════════════════════════════════════════════ */
      function generateCaptcha() {
        var code = '';
        for (var i = 0; i < 6; i++) code += Math.floor(Math.random() * 10);
        currentCaptcha = code;
        captchaDisplay.textContent = code;
      }

      function openModal() {
        generateCaptcha();
        resetField(modalAccount,  'text');
        resetField(modalPassword, 'password');
        resetField(modalCaptcha,  'text');
        modalOverlay.classList.add('show');
      }

      function closeModal() {
        modalOverlay.classList.remove('show');
      }

      btnModalClose.addEventListener('click', closeModal);

      /* ── 輸入框工具函式 ── */
      function resetField(el, type) {
        el.type  = type;
        el.value = '';
        el.classList.remove('input-error-state');
      }

      function setFieldError(el, label) {
        el.type  = 'text'; /* password 欄位也切換為 text 以顯示錯誤訊息 */
        el.value = label + '錯誤';
        el.classList.add('input-error-state');
      }

      /* ── 聚焦時自動清除錯誤狀態 ── */
      [
        { el: modalAccount,  type: 'text'     },
        { el: modalPassword, type: 'password' },
        { el: modalCaptcha,  type: 'text'     }
      ].forEach(function (item) {
        item.el.addEventListener('focus', function () {
          if (item.el.classList.contains('input-error-state')) {
            resetField(item.el, item.type);
          }
        });
      });

      /* ── 限制輸入：僅英文 + 數字 ── */
      function filterAlphanumeric(e) {
        e.target.value = e.target.value.replace(/[^a-zA-Z0-9]/g, '');
      }

      /* ── 限制輸入：僅數字，最多 6 位 ── */
      function filterNumeric6(e) {
        e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 6);
      }

      modalAccount.addEventListener('input',  filterAlphanumeric);
      modalPassword.addEventListener('input', filterAlphanumeric);
      modalCaptcha.addEventListener('input',  filterNumeric6);

      /* ════════════════════════════════════════════════════════════
         登入按鈕
      ════════════════════════════════════════════════════════════ */
      btnLogin.addEventListener('click', function () {

        /* 讀取有效值（錯誤狀態下欄位存放的是錯誤訊息，視同空值） */
        var account  = modalAccount.classList.contains('input-error-state')  ? '' : modalAccount.value.trim();
        var password = modalPassword.classList.contains('input-error-state') ? '' : modalPassword.value.trim();
        var captcha  = modalCaptcha.classList.contains('input-error-state')  ? '' : modalCaptcha.value.trim();

        /* 清除上一輪的錯誤樣式 */
        resetField(modalAccount,  'text');
        resetField(modalPassword, 'password');
        resetField(modalCaptcha,  'text');

        var hasError = false;

        /* 空值 & 驗證碼比對（可同時標記多個欄位） */
        if (!account) {
          setFieldError(modalAccount, '帳號');
          hasError = true;
        }
        if (!password) {
          setFieldError(modalPassword, '密碼');
          hasError = true;
        }
        if (!captcha || captcha !== currentCaptcha) {
          setFieldError(modalCaptcha, '驗證碼');
          generateCaptcha(); /* 驗證碼不符時立即更新顯示屏 */
          hasError = true;
        }

        if (hasError) return;

        /* ── 頻率限制檢查（ADMIN 帳號豁免，其餘每小時最多 5 次）── */
        if (account !== 'ADMIN') {
          var rlResult = checkRateLimit();
          if (rlResult !== 'allowed') {
            showRateLimitToast();
            return;
          }
        }

        /* ── 呼叫 GAS Web App 驗證帳號密碼 ── */
        showLoading();
        btnLogin.disabled    = true;
        btnLogin.textContent = '驗　證　中';

        /*
         * 雙層 requestAnimationFrame：
         * 確保瀏覽器至少完成一次畫面渲染（動畫遮罩可見）後，
         * 再發出 fetch 請求，避免動畫因同步程式碼延遲而無法即刻顯示。
         */
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {

            fetch(GAS_WEBAPP_URL, {
              method:   'POST',
              headers:  { 'Content-Type': 'text/plain;charset=UTF-8' },
              body:     JSON.stringify({
                account:   account,
                password:  password,
                token:     GAS_API_TOKEN,
                brand:     pendingFormData ? pendingFormData.brand    : '',
                model:     pendingFormData ? pendingFormData.model    : '',
                age:       pendingFormData ? pendingFormData.age      : '0',
                loanType:  pendingFormData ? pendingFormData.loanType : '',
                guarantor: pendingFormData ? pendingFormData.guarantor: '否'
              }),
              redirect: 'follow'
            })
            .then(function (res) { return res.json(); })
            .then(function (data) {
              hideLoading();
              btnLogin.disabled    = false;
              btnLogin.textContent = '登　入';

              if (data.success) {
                var aiSuggestion = data.aiSuggestion || '';
                closeModal();
                toastSuccess.classList.add('show');
                setTimeout(function () {
                  toastSuccess.classList.remove('show');
                  showResults(aiSuggestion);
                }, 3000);
              } else {
                /* 比對失敗：依後台回應標記對應欄位錯誤，並重新產生驗證碼 */
                generateCaptcha();
                resetField(modalCaptcha, 'text');
                if (data.error === 'rate_limited') {
                  /* 後端也觸發頻率限制時，同步顯示警示框 */
                  showRateLimitToast();
                } else if (data.error === 'account_not_found') {
                  setFieldError(modalAccount, '帳號');
                } else if (data.error === 'wrong_password') {
                  setFieldError(modalPassword, '密碼');
                } else {
                  alert('伺服器錯誤，請稍後再試。');
                }
              }
            })
            .catch(function () {
              hideLoading();
              btnLogin.disabled    = false;
              btnLogin.textContent = '登　入';
              alert('連線失敗，請確認網路連線或聯絡管理員。');
            });

          });
        });
      });

    })();
  </script>

</body>
